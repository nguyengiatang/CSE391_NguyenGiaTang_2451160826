<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./debug_layout.css">
</head>

<body>
    <h1>Layout Debug Demo</h1>

    <!-- Layout bị vỡ -->
    <h2>1. Layout bị vỡ (content-box mặc định)</h2>

    <div class="container broken">
        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content bị xuống dòng
        </div>
    </div>

    <hr>

    <!-- Fix bằng border-box -->
    <h2>2. Fix bằng border-box</h2>

    <div class="container fixed-border-box">
        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content nằm cùng hàng
        </div>
    </div>

    <hr>

    <!-- Fix bằng giảm width thủ công -->
    <h2>3. Fix bằng cách giảm width thủ công</h2>

    <div class="container fixed-manual">
        <div class="sidebar">
            Sidebar
        </div>

        <div class="content">
            Content nằm cùng hàng
        </div>
    </div>

</body>

</html>
