<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form đăng ký</title>
</head>
<body>

<form action="#" method="POST">

    <!-- FIELDSET 1 -->
    <fieldset>
        <legend>Thông tin cá nhân</legend>

        <label for="fullname">Họ tên:</label><br>
        <input type="text" id="fullname" name="fullname"
               required minlength="2" maxlength="50"
               placeholder="Nhập họ tên"><br><br>

        <label for="email">Email:</label><br>
        <input type="email" id="email" name="email"
               required placeholder="Nhập email"><br><br>

        <label for="phone">Số điện thoại:</label><br>
        <input type="tel" id="phone" name="phone"
               pattern="[0-9]{10}"
               required placeholder="Nhập 10 chữ số"><br><br>

        <label for="dob">Ngày sinh:</label><br>
        <input type="date" id="dob" name="dob"
               max="2026-04-28"
               required><br><br>
    </fieldset>

    <br>

    <!-- FIELDSET 2 -->
    <fieldset>
        <legend>Tài khoản</legend>

        <label for="username">Username:</label><br>
        <input type="text" id="username" name="username"
               pattern="[a-zA-Z0-9_]{3,20}"
               required placeholder="3-20 ký tự"><br><br>

        <label for="password">Password:</label><br>
        <input type="password" id="password" name="password"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
               required placeholder="Ít nhất 8 ký tự"><br><br>

        <label for="confirm">Xác nhận password:</label><br>
        <input type="password" id="confirm" name="confirm"
               minlength="8"
               pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
               required placeholder="Nhập lại mật khẩu"><br><br>
    </fieldset>

    <br>

    <!-- FIELDSET 3 -->
    <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="city">Thành phố:</label><br>
        <select id="city" name="city" required>
            <option value="">Chọn thành phố</option>
            <option value="hn">Hà Nội</option>
            <option value="hcm">TP.HCM</option>
            <option value="dn">Đà Nẵng</option>
            <option value="hp">Hải Phòng</option>
            <option value="ct">Cần Thơ</option>
        </select><br><br>

        <label for="district">Quận/Huyện:</label><br>
        <select id="district" name="district" required>
            <option value="">Chọn quận/huyện</option>
            <option value="q1">Quận 1</option>
            <option value="q2">Quận 2</option>
            <option value="bd">Ba Đình</option>
            <option value="cg">Cầu Giấy</option>
        </select><br><br>

        <label for="address">Địa chỉ chi tiết:</label><br>
        <textarea id="address" name="address" rows="3"
                  required placeholder="Nhập địa chỉ"></textarea><br><br>

        <p>Giới tính:</p>
        <input type="radio" id="male" name="gender" value="male" required>
        <label for="male">Nam</label>

        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Nữ</label>

        <input type="radio" id="other" name="gender" value="other">
        <label for="other">Khác</label><br><br>
    </fieldset>

    <br>

    <!-- TERMS -->
    <input type="checkbox" id="terms" name="terms" required>
    <label for="terms">Tôi đồng ý với điều khoản</label><br><br>

    <!-- BUTTONS -->
    <button type="submit">Đăng ký</button>
    <button type="reset">Nhập lại</button>

</form>

</body>
</html>
