<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giới thiệu sản phẩm</title>
</head>
<body>

<h1>Giới thiệu sản phẩm nổi bật</h1>

<!-- SVG -->
<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="40" fill="blue"></circle>
    <text x="50" y="55" text-anchor="middle" fill="white" font-size="18">TLU</text>
</svg>

<hr>

<!-- ẢNH -->
<figure>
    <img src="https://placehold.co/300x200"
         alt="iPhone 16 Pro Max màu Titan, thiết kế cao cấp"
         loading="lazy"
         style="max-width: 100%; height: auto;">
    <figcaption>iPhone 16 Pro Max — 25.990.000đ</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200"
         alt="Samsung Galaxy S24 Ultra với bút S-Pen"
         loading="lazy"
         style="max-width: 100%; height: auto;">
    <figcaption>Samsung Galaxy S24 Ultra — 23.990.000đ</figcaption>
</figure>

<figure>
    <img src="https://placehold.co/300x200"
         alt="Xiaomi 14 thiết kế hiện đại, camera Leica"
         loading="lazy"
         style="max-width: 100%; height: auto;">
    <figcaption>Xiaomi 14 — 15.990.000đ</figcaption>
</figure>

<hr>

<!-- YOUTUBE IFRAME -->
<h2>Video giới thiệu</h2>
<iframe width="560" height="315"
    src="https://www.youtube.com/embed/dQw4w9WgXcQ"
    title="Video giới thiệu sản phẩm"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
    allowfullscreen>
</iframe>

<hr>

<!-- VIDEO -->
<h2>Video demo</h2>
<video controls poster="https://placehold.co/600x300"
       style="max-width: 100%; height: auto;">
    <source src="sample.mp4" type="video/mp4">
    <source src="sample.webm" type="video/webm">
    Trình duyệt của bạn không hỗ trợ video HTML5.
</video>

<hr>

<!-- AUDIO -->
<h2>Nhạc nền</h2>
<audio controls>
    <source src="sample.mp3" type="audio/mpeg">
    <source src="sample.ogg" type="audio/ogg">
    Trình duyệt của bạn không hỗ trợ audio.
</audio>

</body>
</html>
