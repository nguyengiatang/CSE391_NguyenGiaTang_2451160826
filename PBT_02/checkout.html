<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>
<body>

<h1>Thanh toán đơn hàng</h1>

<!-- BONUS: datalist -->
<label for="search">Tìm sản phẩm:</label>
<input type="text" id="search" name="search" list="product-list" placeholder="Nhập sản phẩm">
<datalist id="product-list">
    <option value="iPhone 16 Pro Max">
    <option value="Samsung Galaxy S24">
    <option value="Xiaomi 14">
</datalist>

<hr>

<!-- PHẦN 1: GIỎ HÀNG -->
<h2>Giỏ hàng</h2>
<table border="1">
    <thead>
        <tr>
            <th>STT</th>
            <th>Sản phẩm</th>
            <th>Đơn giá</th>
            <th>Số lượng</th>
            <th>Thành tiền</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>1</td>
            <td>iPhone 16 Pro Max</td>
            <td>25.990.000đ</td>
            <td>1</td>
            <td>25.990.000đ</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Samsung Galaxy S24</td>
            <td>23.990.000đ</td>
            <td>1</td>
            <td>23.990.000đ</td>
        </tr>
        <tr>
            <td>3</td>
            <td>Xiaomi 14</td>
            <td>15.990.000đ</td>
            <td>1</td>
            <td>15.990.000đ</td>
        </tr>
    </tbody>
    <tfoot>
        <tr>
            <td colspan="4"><strong>Tổng cộng</strong></td>
            <td><output name="total">65.970.000đ</output></td>
        </tr>
    </tfoot>
</table>

<hr>

<form action="#" method="POST">

    <!-- PHẦN 2: THANH TOÁN -->
    <fieldset>
        <legend>Thanh toán</legend>

        <p>Phương thức thanh toán:</p>

        <input type="radio" id="cod" name="payment" value="cod" required>
        <label for="cod">COD</label>

        <input type="radio" id="bank" name="payment" value="bank">
        <label for="bank">Chuyển khoản</label>

        <input type="radio" id="wallet" name="payment" value="wallet">
        <label for="wallet">Ví điện tử</label>

        <br><br>

        <label for="coupon">Mã giảm giá:</label>
        <input type="text" id="coupon" name="coupon"
               pattern="SALE[0-9]{4}"
               placeholder="SALE2026">

        <br><br>

        <label for="note">Ghi chú:</label><br>
        <textarea id="note" name="note" rows="3"
                  placeholder="Nhập ghi chú"></textarea>
    </fieldset>

    <br>

    <!-- PHẦN 3: GIAO HÀNG -->
    <fieldset>
        <legend>Thông tin giao hàng</legend>

        <label for="delivery-date">Ngày giao hàng:</label>
        <input type="date" id="delivery-date" name="delivery-date"
               min="2026-04-29" required>

        <br><br>

        <label for="time-slot">Khung giờ:</label>
        <select id="time-slot" name="time-slot" required>
            <option value="">Chọn khung giờ</option>
            <option value="morning">Sáng (8-12h)</option>
            <option value="afternoon">Chiều (14-18h)</option>
            <option value="evening">Tối (18-21h)</option>
        </select>

        <br><br>

        <label for="days">Thời gian giao hàng (ngày):</label>
        <input type="range" id="days" name="days"
               min="1" max="7" step="1">

        <br><br>

        <!-- BONUS: meter -->
        <label for="points">Điểm tích lũy:</label>
        <meter id="points" min="0" max="100" value="70">70%</meter>
    </fieldset>

    <br>

    <!-- SUBMIT -->
    <button type="submit" aria-label="Xác nhận đặt hàng">
        Xác nhận đặt hàng
    </button>

</form>

</body>
</html>
